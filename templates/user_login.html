{% extends 'base.html' %}
{% block title %}Privat inloggning{% endblock %}
{% block content %}
    <div class="auth-layout">
        <div class="auth-main">
            <h1>Privat inloggning</h1>
            {% if error %}<p class="message error">{{ error }}</p>{% endif %}
            <form action="/login" method="POST" class="form-card">
                <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                <label for="personnummer">Personnummer:</label>
                <input type="text" id="personnummer" name="personnummer" required placeholder="ÅÅMMDDXXXX">
                <label for="password">Lösenord:</label>
                <input type="password" id="password" name="password" required>
                <button type="submit" class="btn">Logga in</button>
            </form>
        </div>
    </div>
{% endblock %}
