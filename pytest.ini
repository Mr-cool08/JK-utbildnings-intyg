[pytest]
# Keep pytest temp and cache artifacts inside the workspace so parallel runs
# work reliably on Windows machines with restricted system temp directories.
addopts = --basetemp=.pytest_tmp/run
cache_dir = .pytest_tmp/cache

# Markers for test categorization
markers =
    docker: marks tests as requiring Docker (deselect with '-m "not docker"')
    slow: marks tests as slow
    allow_public_rate_limited: bypassar publik rate-limit i tester som uttryckligen behöver det

testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

