services:
  traefik:
    image: traefik
    ports:
      - "443:443"
    volumes:
      - ./deploy/traefik/dynamic:/etc/traefik/dynamic:ro
      - ${ORIGIN_CERT_PATH:-/etc/ssl/cloudflare/origin.crt}:/etc/traefik/certs/origin.crt:ro
      - ${ORIGIN_KEY_PATH:-/etc/ssl/cloudflare/origin.key}:/etc/traefik/certs/origin.key:ro
      - traefik_logs:/var/log/traefik
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.file.directory=/etc/traefik/dynamic
      - --entrypoints.web.address=:80
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --entrypoints.websecure.address=:443
      - --entrypoints.websecure.http.tls=true
      - --log.level=INFO
      - --log.filepath=/var/log/traefik/traefik.log
      - --accesslog=true
      - --accesslog.filepath=/var/log/traefik/access.log
      
    networks:
      - public_net
    restart: unless-stopped
    mem_limit: 96m
    memswap_limit: 96m
    cpus: "0.15"
    pids_limit: 100

  fail2ban:
    image: crazymax/fail2ban
    cap_add:
      - NET_ADMIN
      - NET_RAW
    network_mode: host
    volumes:
      - ./deploy/fail2ban/jail.local:/data/jail.local:ro
      - ./deploy/fail2ban/fail2ban.local:/data/fail2ban.local:ro
      - traefik_logs:/var/log/traefik:ro
      - fail2ban_data:/data/db
    restart: unless-stopped
    mem_limit: 96m
    memswap_limit: 96m
    cpus: "0.10"
    pids_limit: 100

  server_monitor:
    build: ./services/server_monitor
    env_file:
      - .env
    environment:
      SMTP_SERVER: ${SMTP_SERVER:-${smtp_server:-}}
      SMTP_PORT: ${SMTP_PORT:-${smtp_port:-587}}
      SMTP_USER: ${SMTP_USER:-${smtp_user:-}}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-${smtp_password:-}}
      SMTP_TIMEOUT: ${SMTP_TIMEOUT:-${smtp_timeout:-30}}
      CRITICAL_ALERTS_EMAIL: ${CRITICAL_ALERTS_EMAIL:-}
      HOST_ROOT: /host
      MONITOR_CHECK_INTERVAL_SECONDS: ${MONITOR_CHECK_INTERVAL_SECONDS:-60}
      CLAMAV_SCAN_IMAGE: ${CLAMAV_SCAN_IMAGE:-clamav/clamav:stable}
      CLAMAV_SCAN_TIMEOUT_SECONDS: ${CLAMAV_SCAN_TIMEOUT_SECONDS:-21600}
    volumes:
      - /:/host:ro
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    mem_limit: 128m
    memswap_limit: 128m
    cpus: "0.15"
    pids_limit: 120
    networks:
      - public_net

  app:
    build: .
    env_file:
      - .env
    environment:
      LOG_DIR: /app/logs
      DATABASE_URL: postgresql://${POSTGRES_USER:-}:${POSTGRES_PASSWORD:-}@postgres:5432/${POSTGRES_DB:-}
      WEB_CONCURRENCY: ${WEB_CONCURRENCY:-1}
      THREADS: ${THREADS:-4}
    expose:
      - "80"
    ports:
      - "80:80"
    volumes:
      - env_data:/config
      - app_logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - public_net
      - db_net
    labels:
      - traefik.enable=true
      - traefik.docker.network=${PUBLIC_NETWORK_NAME:-jk_public_net}
      - traefik.http.routers.app.rule=Host(`utbildningsintyg.se`) || Host(`www.utbildningsintyg.se`)
      - traefik.http.routers.app-mta-sts.rule=Host(`mta-sts.utbildningsintyg.se`) && Path(`/.well-known/mta-sts.txt`)
      - traefik.http.routers.app.entrypoints=websecure
      - traefik.http.routers.app-mta-sts.entrypoints=websecure
      - traefik.http.routers.app.tls=true
      - traefik.http.routers.app-mta-sts.tls=true
      - traefik.http.routers.app.middlewares=security-headers@file,upload-buffer@file
      - traefik.http.routers.app-mta-sts.middlewares=security-headers@file
      - traefik.http.services.app.loadbalancer.server.port=80
    restart: unless-stopped
    mem_limit: 384m
    memswap_limit: 384m
    cpus: "0.45"
    pids_limit: 200

  expiry_reminder:
    build: .
    command: ["python", "-m", "scripts.send_expiry_reminders"]
    env_file:
      - .env
    environment:
      LOG_DIR: /app/logs
      DATABASE_URL: postgresql://${POSTGRES_USER:-}:${POSTGRES_PASSWORD:-}@postgres:5432/${POSTGRES_DB:-}
    volumes:
      - env_data:/config
      - app_logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - public_net
      - db_net
    restart: "no"
    mem_limit: 128m
    memswap_limit: 128m
    cpus: "0.10"
    pids_limit: 120

  vscode:
    image: codercom/code-server:latest
    profiles:
      - "true"
      - "TRUE"
      - "True"
      - "1"
      - "yes"
      - "YES"
      - "on"
      - "ON"
    env_file:
      - .env
    environment:
      DEV_MODE: ${DEV_MODE:-false}
      PASSWORD: ${VSCODE_PASSWORD:-}
      TZ: ${TZ:-Europe/Stockholm}
    working_dir: /workspace
    ports:
      - "${VSCODE_BIND_IP:-127.0.0.1}:8083:8080"
    volumes:
      - .:/workspace
    networks:
      - public_net
    restart: "no"
    mem_limit: 1g
    memswap_limit: 1g
    cpus: "0.75"
    pids_limit: 300

  postgres:
    image: postgres:16
    command:
      - postgres
      - -c
      - shared_buffers=128MB
      - -c
      - work_mem=2MB
      - -c
      - maintenance_work_mem=32MB
      - -c
      - effective_cache_size=256MB
      - -c
      - max_connections=30
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-}
      POSTGRES_DB: ${POSTGRES_DB:-}
      POSTGRES_INITDB_ARGS: "--data-checksums"
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      # Publik exponering kräver POSTGRES_BIND_IP=0.0.0.0 (default är endast lokal åtkomst).
      - "${POSTGRES_BIND_IP:-127.0.0.1}:${POSTGRES_PUBLIC_PORT:-1543}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-} -d ${POSTGRES_DB:-} -h 127.0.0.1 -p 5432"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s
    networks:
      - pg_pub_net
      - db_net
    restart: unless-stopped
    mem_limit: 512m
    memswap_limit: 512m
    cpus: "0.60"
    pids_limit: 200

  postgres_backup:
    image: postgres:16
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST:-}
      POSTGRES_DB: ${POSTGRES_DB:-}
      POSTGRES_USER: ${POSTGRES_USER:-}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-}
      BACKUP_DIR: /backups
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-7}
      BACKUP_INTERVAL_SECONDS: ${BACKUP_INTERVAL_SECONDS:-86400}
    volumes:
      - pgdata_backups:/backups
      - ./scripts/backup:/scripts:ro
    command: ["bash", "/scripts/postgres_backup.sh", "--loop"]
    networks:
      - db_net
    restart: unless-stopped
    mem_limit: 64m
    memswap_limit: 64m
    cpus: "0.05"
    pids_limit: 50

volumes:
  env_data:
  app_logs:
    name: jk-utbildnings-intyg_app_logs
  demo_logs:
    name: jk-utbildnings-intyg_demo_logs
  status_logs:
    name: jk-utbildnings-intyg_status_logs
  traefik_logs:
    name: jk-utbildnings-intyg_traefik_logs
  fail2ban_data:
  pgdata:
    name: jk-utbildnings-intyg_pgdata
  pgdata_backups:
    name: jk-utbildnings-intyg_pgdata_backups
networks:
  public_net:
    name: ${PUBLIC_NETWORK_NAME:-jk_public_net}
  pg_pub_net: {}
  db_net:
    internal: true
